<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Build20 Single File Preview</title><style>:root{--blue:#0B3D91;--navy:#071A33;--bg:#F5F7FA;--green:#22C55E;--orange:#F59E0B;--red:#EF4444;--line:#E2E8F0;--muted:#64748B;--card:#fff;--ink:#102033;--shadow:0 18px 50px rgba(7,26,51,.16)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}a{text-decoration:none;color:var(--blue)}
.topbar{background:var(--navy);color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;gap:18px;position:sticky;top:0;z-index:50;box-shadow:0 8px 24px rgba(7,26,51,.25)}
.brand a{font-size:25px;font-weight:900;color:white}.brand span{display:block;color:#CBD5E1;font-size:12px;margin-top:3px}.nav{display:flex;gap:14px;flex-wrap:wrap}.nav a{color:white;font-weight:800}.wrap{max-width:1180px;margin:auto;padding:32px 18px}.hero{background:linear-gradient(135deg,var(--blue),var(--navy));color:white;border-radius:24px;padding:46px;margin-bottom:30px;box-shadow:var(--shadow)}.hero h1{font-size:44px;line-height:1.05;margin:0 0 12px}.hero p{font-size:18px;color:#E2E8F0;max-width:780px}.btn,button{display:inline-block;border:0;border-radius:11px;background:var(--green);color:#06120A;font-weight:900;padding:11px 16px;cursor:pointer;margin:4px 6px 4px 0}.btn.secondary{background:white;color:var(--blue)}.btn.warn{background:var(--orange);color:#111827}.btn.danger{background:var(--red);color:white}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}.card,.box,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 26px rgba(7,26,51,.08)}.mock-img{width:100%;height:150px;border-radius:14px;background:linear-gradient(135deg,#DBEAFE,#EFF6FF);display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:900;text-align:center;padding:12px}.price{font-size:24px;color:var(--blue);font-weight:900}.muted{color:var(--muted)}input,textarea,select{width:100%;padding:12px;margin:7px 0 14px;border:1px solid #CBD5E1;border-radius:10px;background:white}textarea{min-height:120px}.split{display:grid;grid-template-columns:1fr 1fr;gap:20px}.detail{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:28px}.status{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.draft,.pending,.quarantined{background:#FEF3C7;color:#92400E}.active,.paid,.approved,.sent,.verified{background:#DCFCE7;color:#166534}.rejected,.failed,.invalid{background:#FEE2E2;color:#991B1B}.notice{border-left:5px solid var(--orange);background:#FFFBEB;padding:14px;border-radius:12px;margin:15px 0}.footer{text-align:center;color:var(--muted);padding:30px}code,pre{display:block;background:var(--navy);color:white;padding:14px;border-radius:10px;overflow:auto}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px 0}.step{background:white;border-left:5px solid var(--blue);padding:16px;border-radius:14px;box-shadow:0 8px 22px rgba(7,26,51,.07)}.step b{display:block;color:var(--blue);margin-bottom:6px}.section-title{margin:32px 0 16px}.admin-actions{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}.small{font-size:12px;color:var(--muted)}table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#EAF0FB;color:var(--navy)}@media(max-width:780px){.topbar{display:block}.nav{margin-top:12px}.hero h1{font-size:33px}.detail,.split{grid-template-columns:1fr}.steps{grid-template-columns:1fr}}</style></head><body><header class="topbar"><div class="brand"><a href="index.html">Software Tools Marketplace</a><span>Practical Software Tools for Real-World Technical Work</span></div><nav class="nav"><a href="products.html">Products</a><a href="seller-register.html">Register Seller</a><a href="seller-dashboard.html">Seller</a><a href="admin-dashboard.html">Admin</a></nav></header><main class="wrap"><section class="hero"><h1>Build20 Marketplace</h1><p>Go-live hardening + PayFast ITN validation + terms.</p></section><div id="latest-grid" class="grid"></div></main><footer class="footer"><a href="terms.html">Terms</a> · <a href="privacy.html">Privacy</a> · <a href="refund-policy.html">Refund Policy</a> · Software Tools Marketplace Build20</footer><script>const localProducts=[{id:'p_001',name:'NAS Backup Audit Tool',slug:'nas-backup-audit-tool',price:249,platform:'Windows',seller:'APC Utilities',type:'PowerShell Tool',status:'active',desc:'Audit NAS folders, sizes and backup structure.'},{id:'p_002',name:'ESP32 Gate HMI Pack',slug:'esp32-gate-hmi-pack',price:399,platform:'ESP32',seller:'Wykies Automation',type:'Firmware Package',status:'active',desc:'Embedded project package with docs and firmware.'}];
let products=[...localProducts];
function money(n){return 'R '+Number(n||0).toFixed(2)}
async function api(path,opts={}){const r=await fetch(path,{headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts});const t=await r.text();try{return JSON.parse(t)}catch{return t}}
async function tryLoadBackendProducts(){try{const rows=await api('/api/public/products');if(Array.isArray(rows)&&rows.length){products=rows.map(p=>({id:p.id,name:p.name,slug:p.slug,price:p.price,platform:p.platform||'Software',seller:p.sellerName||p.seller||'Seller',type:p.type||p.category||'Software Tool',status:p.status||'active',desc:p.shortDescription||p.desc||'',long:p.longDescription||p.long||p.shortDescription||''}));}}catch(e){products=[...localProducts]}}
function card(p){return `<article class="card"><div class="mock-img">${p.type}</div><h3><a href="product.html?slug=${p.slug}">${p.name}</a></h3><p class="muted">${p.desc||''}</p><p class="price">${money(p.price)}</p><p class="muted">${p.platform||'Software'} · Seller: ${p.seller||'Seller'}</p><a class="btn" href="product.html?slug=${p.slug}">View Product</a></article>`}
function renderCards(targetId){const el=document.getElementById(targetId);if(!el)return;el.innerHTML=products.map(card).join('')}
async function submitSellerRegistration(){const payload={sellerName:document.getElementById('sellerName')?.value,email:document.getElementById('sellerEmail')?.value,password:document.getElementById('sellerPassword')?.value,contactName:document.getElementById('contactName')?.value,payoutMethod:document.getElementById('payoutMethod')?.value,bankName:document.getElementById('bankName')?.value,accountHolder:document.getElementById('accountHolder')?.value,accountNumber:document.getElementById('accountNumber')?.value,termsAccepted:document.getElementById('termsAccepted')?.checked};const r=await api('/api/seller/register',{method:'POST',body:JSON.stringify(payload)});alert(JSON.stringify(r,null,2));}
async function submitProductListing(){const payload={name:document.getElementById('newProductName')?.value,price:Number(document.getElementById('newProductPrice')?.value||0),platform:document.getElementById('newProductPlatform')?.value,type:document.getElementById('newProductType')?.value,shortDescription:document.getElementById('newProductDesc')?.value};const r=await api('/api/seller/products/create',{method:'POST',headers:{'x-demo-user':'u_seller_1'},body:JSON.stringify(payload)});alert(JSON.stringify(r,null,2));}
async function loadAdminProducts(){const el=document.getElementById('product-approval-data');if(!el)return;try{const rows=await api('/api/admin/products/pending',{headers:{'x-demo-user':'u_admin_1'}});if(!Array.isArray(rows)||!rows.length){el.innerHTML='<div class="notice">No pending products.</div>';return}el.innerHTML=`<table><thead><tr><th>Product</th><th>Status</th><th>Price</th><th>Actions</th></tr></thead><tbody>${rows.map(p=>`<tr><td><b>${p.name}</b><br>${p.shortDescription||''}<br><span class="small">${p.id}</span></td><td><span class="status ${p.approvalStatus}">${p.approvalStatus}</span></td><td>${money(p.price)}</td><td><button onclick="approveProduct('${p.id}')">Approve</button><button class="danger" onclick="rejectProduct('${p.id}')">Reject</button></td></tr>`).join('')}</tbody></table>`}catch(e){el.innerHTML='<div class="notice">Run backend to view product approval.</div>'}}
async function approveProduct(id){const r=await api('/api/admin/products/'+id+'/approve',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:'{}'});alert(JSON.stringify(r,null,2));loadAdminProducts()}
async function rejectProduct(id){const reason=prompt('Reject reason:','Rejected by admin')||'Rejected';const r=await api('/api/admin/products/'+id+'/reject',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:JSON.stringify({reason})});alert(JSON.stringify(r,null,2));loadAdminProducts()}
async function loadSellerApplications(){const el=document.getElementById('seller-approval-data');if(!el)return;try{const rows=await api('/api/admin/sellers/applications',{headers:{'x-demo-user':'u_admin_1'}});if(!Array.isArray(rows)||!rows.length){el.innerHTML='<div class="notice">No seller applications.</div>';return}el.innerHTML=`<table><thead><tr><th>Seller</th><th>Status</th><th>Payout</th><th>Actions</th></tr></thead><tbody>${rows.map(s=>`<tr><td><b>${s.sellerName}</b><br>${s.email}<br><span class="small">${s.id}</span></td><td><span class="status ${s.status}">${s.status}</span></td><td>${s.payoutMethod||''}<br>${s.bankName||''}</td><td><button onclick="approveSeller('${s.id}')">Approve</button><button class="danger" onclick="rejectSeller('${s.id}')">Reject</button></td></tr>`).join('')}</tbody></table>`}catch(e){el.innerHTML='<div class="notice">Run backend to view seller applications.</div>'}}
async function approveSeller(id){const r=await api('/api/admin/sellers/'+id+'/approve',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:'{}'});alert(JSON.stringify(r,null,2));loadSellerApplications()}
async function rejectSeller(id){const reason=prompt('Reject reason:','Rejected by admin')||'Rejected';const r=await api('/api/admin/sellers/'+id+'/reject',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:JSON.stringify({reason})});alert(JSON.stringify(r,null,2));loadSellerApplications()}
async function uploadProductPackage(){const f=document.getElementById('packageFile')?.files?.[0];if(!f){alert('Select a package file first.');return}const fd=new FormData();fd.append('package',f);fd.append('productId',document.getElementById('productId')?.value||'p_001');const r=await fetch('/api/seller/packages/upload',{method:'POST',headers:{'x-demo-user':'u_seller_1'},body:fd});alert(await r.text())}
async function loadAdminFiles(){const el=document.getElementById('file-review-data');if(!el)return;try{const rows=await api('/api/admin/storage/files',{headers:{'x-demo-user':'u_admin_1'}});if(!Array.isArray(rows)||!rows.length){el.innerHTML='<div class="notice">No uploaded packages yet.</div>';return}el.innerHTML=`<table><thead><tr><th>File</th><th>Status</th><th>Product</th><th>Size</th><th>Actions</th></tr></thead><tbody>${rows.map(f=>`<tr><td>${f.originalName}<br><span class="small">${f.sha256}</span></td><td><span class="status ${f.status}">${f.status}</span></td><td>${f.productId}</td><td>${f.size}</td><td><button onclick="approveFile('${f.id}')">Approve</button><button class="danger" onclick="rejectFile('${f.id}')">Reject</button></td></tr>`).join('')}</tbody></table>`}catch(e){el.innerHTML='<div class="notice">Run backend to view file review.</div>'}}
async function approveFile(id){const r=await api('/api/admin/storage/files/'+id+'/approve',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:'{}'});alert(JSON.stringify(r,null,2));loadAdminFiles()}
async function rejectFile(id){const reason=prompt('Reject reason:','Rejected by admin review')||'Rejected';const r=await api('/api/admin/storage/files/'+id+'/reject',{method:'POST',headers:{'x-demo-user':'u_admin_1'},body:JSON.stringify({reason})});alert(JSON.stringify(r,null,2));loadAdminFiles()}
async function loadPayoutLedger(){const el=document.getElementById('payout-ledger-data');if(!el)return;try{const rows=await api('/api/admin/payouts/ledger',{headers:{'x-demo-user':'u_admin_1'}});if(!Array.isArray(rows)||!rows.length){el.innerHTML='<div class="notice">No ledger entries yet.</div>';return}el.innerHTML=`<table><thead><tr><th>Seller</th><th>Order</th><th>Gross</th><th>Platform 5%</th><th>Seller Net</th><th>Status</th></tr></thead><tbody>${rows.map(x=>`<tr><td>${x.sellerId}</td><td>${x.orderRef}</td><td>${money(x.grossAmount)}</td><td>${money(x.platformFee)}</td><td>${money(x.sellerNet)}</td><td><span class="status ${x.status}">${x.status}</span></td></tr>`).join('')}</tbody></table>`}catch(e){el.innerHTML='<div class="notice">Run backend to view payout ledger.</div>'}}
async function loadPayFastDiagnostics(){const el=document.getElementById('payfast-diagnostics-data');if(!el)return;try{const r=await api('/api/admin/payfast/diagnostics',{headers:{'x-demo-user':'u_admin_1'}});el.innerHTML='<pre>'+JSON.stringify(r,null,2)+'</pre>'}catch(e){el.innerHTML='<div class="notice">Run backend to view PayFast diagnostics.</div>'}}
window.addEventListener('DOMContentLoaded',async()=>{await tryLoadBackendProducts();renderCards('product-grid');renderCards('latest-grid');loadSellerApplications();loadAdminProducts();loadAdminFiles();loadPayoutLedger();loadPayFastDiagnostics();});</script></body></html>
